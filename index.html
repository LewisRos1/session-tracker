<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Therapy Tracker</title>
  <meta name="description" content="Therapy session scoring and tracking" />

  <!-- PWA / iOS -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Therapy Tracker" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="styles.css" />

  <!-- ExcelJS (Excel export with bold support) -->
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════
       PIN SCREEN
       ══════════════════════════════════════════════════════ -->
  <div id="screen-pin" class="screen active">
    <div class="pin-container">
      <div class="pin-logo">🧩</div>
      <h1 class="pin-title">Therapy Tracker</h1>
      <p class="pin-subtitle">Enter PIN to continue</p>
      <div class="pin-dots" id="pin-dots"></div>
      <div id="pin-error" class="pin-error hidden">Incorrect PIN. Try again.</div>
      <div class="pin-keypad" id="pin-keypad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key pin-key-back" data-key="back">⌫</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key pin-key-empty" disabled></button>
      </div>
      <span class="pin-version" id="pin-version"></span>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       HOME SCREEN
       ══════════════════════════════════════════════════════ -->
  <div id="screen-home" class="screen hidden">
    <header class="app-header">
      <h1>Therapy Tracker</h1>
      <span id="app-version" class="app-version"></span>
    </header>
    <main class="home-main">
      <section>
        <div class="section-header">
          <h2 class="section-title">Existing Students</h2>
          <input type="search" class="section-search" id="search-existing"
            placeholder="Search…" autocomplete="off" />
          <button class="btn-add-section" id="btn-add-existing-student">+ Add</button>
        </div>
        <div class="student-buttons" id="existing-student-buttons"></div>
      </section>
      <section>
        <div class="section-header">
          <h2 class="section-title">Student Assessments</h2>
          <input type="search" class="section-search" id="search-assessment"
            placeholder="Search…" autocomplete="off" />
          <button class="btn-add-section" id="btn-add-assessment-student">+ Add</button>
        </div>
        <div class="student-buttons" id="assessment-student-buttons"></div>
      </section>
      <section>
        <div class="section-header">
          <h2 class="section-title">Standard Templates</h2>
          <input type="search" class="section-search" id="search-template"
            placeholder="Search…" autocomplete="off" />
          <button class="btn-add-section" id="btn-add-template">+ Add</button>
        </div>
        <div class="student-buttons" id="template-buttons"></div>
      </section>
      <section>
        <div class="section-header">
          <h2 class="section-title">Export Data</h2>
          <input type="search" class="section-search" id="search-export"
            placeholder="Search…" autocomplete="off" />
        </div>
        <div class="export-buttons" id="export-buttons"></div>
      </section>
    </main>
  </div>

  <!-- ══════════════════════════════════════════════════════
       SESSION SCREEN
       ══════════════════════════════════════════════════════ -->
  <div id="screen-session" class="screen hidden">
    <header class="session-header">
      <button class="btn-back" id="btn-back" aria-label="Back to home">←</button>
      <div class="session-info">
        <span class="session-student-name" id="session-student-name"></span>
        <span class="session-meta"         id="session-meta"></span>
      </div>
    </header>

    <div class="session-body">
      <div class="target-selector">
        <label for="target-select" class="target-label">Target</label>
        <select id="target-select" class="target-dropdown">
          <option value="">— select —</option>
        </select>
        <div class="target-type-chip hidden" id="target-type-chip">
          <span class="target-type-label">Type</span>
          <span class="target-type-value" id="target-type-badge"></span>
        </div>
        <div class="days-average-chip">
          <span class="days-average-label">Target's Avg</span>
          <span class="days-average-value" id="days-average-value">—</span>
        </div>
        <button id="btn-manage-targets" class="btn-manage-targets hidden">Edit Structured Target</button>
      </div>

      <div id="target-content" class="target-content">
        <!-- populated by JS -->
      </div>
    </div>

    <footer class="session-footer" id="session-footer"></footer>
  </div>

  <!-- ══════════════════════════════════════════════════════
       SESSION VIEW SCREEN (table-based view/edit)
       ══════════════════════════════════════════════════════ -->
  <div id="screen-session-view" class="screen hidden">
    <header class="session-header">
      <button class="btn-back" id="btn-view-back" aria-label="Back to home">←</button>
      <div class="session-info">
        <span class="session-student-name" id="view-student-name"></span>
        <span class="session-meta"         id="view-session-meta"></span>
      </div>
    </header>
    <div class="session-view-body" id="session-view-body">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       SCORE PICKER MODAL (bottom sheet)
       ══════════════════════════════════════════════════════ -->
  <div id="score-modal" class="modal hidden" role="dialog" aria-modal="true"
       aria-label="Select score">
    <div class="modal-backdrop" id="score-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">Select Score</span>
        <button class="modal-close" id="score-modal-close" aria-label="Close">✕</button>
      </div>
      <div class="score-buttons" id="score-buttons">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       SESSION PICKER MODAL
       ══════════════════════════════════════════════════════ -->
  <div id="session-picker-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="session-picker-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title" id="session-picker-title">Sessions</span>
        <button class="modal-close" id="session-picker-close" aria-label="Close">✕</button>
      </div>
      <div id="session-picker-list" class="session-picker-list">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       MANAGE MODAL (student / target config editing)
       ══════════════════════════════════════════════════════ -->
  <div id="manage-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="manage-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <div class="modal-header-left">
          <span class="modal-title" id="manage-modal-title">Manage</span>
          <span class="autosave-indicator" id="manage-autosave-indicator"></span>
        </div>
        <button class="modal-close" id="manage-modal-close" aria-label="Close">✕</button>
      </div>
      <div id="manage-modal-body" class="manage-modal-body">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- Main app (ES module) -->
  <script type="module" src="app.js"></script>
</body>
</html>
